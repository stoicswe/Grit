# Grit GitLab iOS Client Build Pipeline

# Static variables for where the resulting artifacts both will be and where they are
# located within the build service for publishing from the build server machine on disk
variables:
  GIT_STRATEGY: clone
  DERIVED_DATA_PATH: $CI_PROJECT_DIR/DerivedData
  ARCHIVE_PATH: $CI_PROJECT_DIR/build/Grit.xcarchive
  EXPORT_PATH: $CI_PROJECT_DIR/build/export
  LANG: "en_US.UTF-8"
  LANGUAGE: "en_US.UTF-8"
  LC_ALL: "en_US.UTF-8"

# SaST Analysis for the project
# ----------------------------------------------------------------------------
# You can override the included template(s) by including variable overrides
# SAST customization: https://docs.gitlab.com/user/application_security/sast/#available-cicd-variables
# Secret Detection customization: https://docs.gitlab.com/user/application_security/secret_detection/pipeline/configure/
# Dependency Scanning customization: https://docs.gitlab.com/user/application_security/dependency_scanning/dependency_scanning_sbom/#customizing-analyzer-behavior
# Container Scanning customization: https://docs.gitlab.com/user/application_security/container_scanning/#customizing-analyzer-behavior
# Note that environment variables can be set in several places
# See https://docs.gitlab.com/ci/variables/#cicd-variable-precedence
# ----------------------------------------------------------------------------
include:
  - template: Security/SAST.gitlab-ci.yml

# These are the stages we use for the build server. The analysis stage runs linters and
# security scanners, the build stage builds the app, the test stage runs tests, and the
# deploy stage deploys the app to the app store connect service at Apple for validation
stages:
  - analysis
  - build
  - test
  - deploy
  - notify

# Default rules for pipeline execution. Runs on merge requests, the default branch, and
# beta/release branches.
.default_rules: &default_rules
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "beta"
    - if: $CI_COMMIT_BRANCH =~ /^beta\/.*/
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/

# Command execution script for setting up the build environment
# between runs for the build server, since we use a physical machine
.setup_script: &setup_script
  - security unlock-keychain -p "$KCHNP" ~/Library/Keychains/login.keychain-db
  - echo "$APPL_ASC_KEY_CHRON" | base64 --decode > /tmp/asc_key.p8
  - export APP_STORE_CONNECT_API_KEY_KEY_ID="$APPL_ASC_KEY_ID"
  - export APP_STORE_CONNECT_API_KEY_ISSUER_ID="$APPL_ASC_ISSUER_ID"
  - export APP_STORE_CONNECT_API_KEY_KEY_FILEPATH="/tmp/asc_key.p8"
  - export MATCH_TOKEN="$MATCH_PK_N"

code_quality:
  tags:
    - macos
  stage: analysis
  allow_failure: true
  script:
    # Resolve the newest installed iPhone 17 Pro simulator on iOS 26.x so this
    # job survives Apple shipping point-release runtimes (e.g. 26.4 → 26.4.1).
    - SIM_ID=$(python3 scripts/resolve-sim.py "iPhone 17 Pro" 26)
    - echo "Using simulator UDID $SIM_ID"
    # --- Xcode Analyze ---
    - xcodebuild analyze
      -scheme Grit
      -destination "id=$SIM_ID"
      -derivedDataPath $DERIVED_DATA_PATH
      -resultBundlePath $CI_PROJECT_DIR/analyze-result.xcresult
      CODE_SIGNING_ALLOWED=NO
      | xcpretty || true

    # Dump raw xcresulttool output so manual inspect is possible if needed
    - xcrun xcresulttool get object --legacy --format json --path $CI_PROJECT_DIR/analyze-result.xcresult > xcresult-raw.json 2>&1 || echo '{}' > xcresult-raw.json

    - xcrun xcresulttool get object --legacy --format json --path $CI_PROJECT_DIR/analyze-result.xcresult \
      | swift ./scripts/convert-analyze.swift > xcode-analyze-report.json \
      || echo '[]' > xcode-analyze-report.json

    # Merge all three
    - jq -s '.[0]' xcode-analyze-report.json > gl-code-quality-report.json
  artifacts:
    reports:
      codequality: gl-code-quality-report.json
    paths:
      - gl-code-quality-report.json
      - xcresult-raw.json
    expire_in: 1 week

semgrep:
  stage: analysis
  tags:
    - macos
  script:
    - semgrep scan --config=p/default --config=p/security-audit . --error
  allow_failure: true # see note below
  <<: *default_rules

# Begin the build portion of the job
#
# The matrix pins each entry to an iOS *major* version only (IOS_MAJOR).
# scripts/resolve-sim.py picks the newest installed simulator runtime that
# matches that major version, so point-release updates on the runner
# (e.g. 26.4 → 26.4.1) don't break the pipeline.
build:
  stage: build
  tags:
    - macos
  parallel:
    matrix:
      - IOS_MAJOR: "26"
        SIMULATOR: "iPhone 17 Pro"
      - IOS_MAJOR: "18"
        SIMULATOR: "iPhone 16 Pro"
      # issues on the build server right now
      #- IOS_MAJOR: "17"
      #  SIMULATOR: "iPhone 15 Pro (OLDEST)"
  script:
    - SIM_ID=$(python3 scripts/resolve-sim.py "$SIMULATOR" "$IOS_MAJOR")
    - echo "Building against $SIMULATOR (iOS $IOS_MAJOR.x) → $SIM_ID"
    - xcodebuild
      -scheme Grit
      -destination "id=$SIM_ID"
      -derivedDataPath $DERIVED_DATA_PATH
      CODE_SIGNING_ALLOWED=NO
      clean build
      | xcpretty
  <<: *default_rules

test:
  stage: test
  tags:
    - macos
  parallel:
    matrix:
      - IOS_MAJOR: "26"
        SIMULATOR: "iPhone 17 Pro"
      - IOS_MAJOR: "18"
        SIMULATOR: "iPhone 16 Pro"
      # issues on the build server right now
      #- IOS_MAJOR: "17"
      #  SIMULATOR: "iPhone 15 Pro (OLDEST)"
  when: manual
  allow_failure: true
  script:
    - SIM_ID=$(python3 scripts/resolve-sim.py "$SIMULATOR" "$IOS_MAJOR")
    - echo "Testing against $SIMULATOR (iOS $IOS_MAJOR.x) → $SIM_ID"
    - xcodebuild test -scheme Grit
      -destination "id=$SIM_ID"
  <<: *default_rules

upload_internal:
  stage: deploy
  tags:
    - macos
  script:
    - *setup_script
    - fastlane build_and_upload
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  artifacts:
    paths:
      - build/
    expire_in: 1 week

upload_external:
  stage: deploy
  tags:
    - macos
  script:
    - *setup_script
    - fastlane build_and_upload external:true
  rules:
    - if: $CI_COMMIT_BRANCH == "beta"
    - if: $CI_COMMIT_BRANCH =~ /^beta\/.*/
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/
  artifacts:
    paths:
      - build/
    expire_in: 1 week

# Post an AI-generated changelog summary to Bluesky after a successful deploy.
# Uses Apple Intelligence (FoundationModels) on the Mac Mini runner to summarise
# the commit descriptions and file changes into a readable social media thread.
#
# Required CI/CD variables (Settings → CI/CD → Variables, masked & protected):
#   BLUESKY_HANDLE       – e.g. grit-app.bsky.social
#   BLUESKY_APP_PASSWORD – generate at Bluesky → Settings → App Passwords
post_changelog:
  stage: notify
  tags:
    - macos
  needs:
    - job: upload_internal
      optional: true
    - job: upload_external
      optional: true
  script:
    - swift scripts/bluesky-changelog.swift
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "beta"
    - if: $CI_COMMIT_BRANCH =~ /^beta\/.*/
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/
