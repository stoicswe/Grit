name: Grit
options:
  bundleIdPrefix: com.grit
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.3"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  Grit:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Grit
    info:
      path: Grit/Info.plist
    entitlements:
      path: Grit/Grit.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grit.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_FILE: Grit/Info.plist
        CODE_SIGN_ENTITLEMENTS: Grit/Grit.entitlements
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
